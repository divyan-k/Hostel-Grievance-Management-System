<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guard Leaves | HostelFlow</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body data-role-page="guard" data-page="guard-leaves">
    <main class="shell dashboard-shell">
      <section class="glass topbar">
        <div>
          <p class="eyebrow">Guard leaves</p>
          <h1 id="dashboard-title">Leave approvals</h1>
        </div>
        <div class="topbar-actions">
          <a class="btn btn-secondary" href="/guard.html">Dashboard</a>
          <a class="btn btn-secondary" href="/profile.html">Profile</a>
          <button class="btn btn-ghost" id="logout-btn" type="button">Logout</button>
        </div>
      </section>
      <section class="glass panel">
        <h2>Pending and recent leaves</h2>
        <p class="muted section-copy">Review student requests quickly and keep departure records organized.</p>
        <div id="leaves-list" class="card-list"></div>
      </section>
      <div id="message" class="message floating"></div>
    </main>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
