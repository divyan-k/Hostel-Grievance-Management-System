<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | HostelFlow</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="shell auth-shell">
      <section class="glass auth-card">
        <p class="eyebrow">Profile settings</p>
        <h1 id="profile-heading">Manage your profile</h1>
        <form id="profile-form" class="stack-form">
          <label>Name<input type="text" name="name" required /></label>
          <label>Room<input type="text" name="room" /></label>
          <button class="btn btn-primary" type="submit">Save changes</button>
        </form>
        <a class="btn btn-secondary" id="back-link" href="/index.html">Back to dashboard</a>
        <div id="message" class="message"></div>
      </section>
    </main>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
