<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Leaves | HostelFlow</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body data-role-page="admin" data-page="admin-leaves">
    <main class="shell dashboard-shell">
      <section class="glass topbar">
        <div>
          <p class="eyebrow">Warden / Chief leaves</p>
          <h1 id="dashboard-title">Leave oversight</h1>
        </div>
        <div class="topbar-actions">
          <a class="btn btn-secondary" href="/admin.html">Dashboard</a>
          <a class="btn btn-secondary" href="/admin-complaints.html">Complaints</a>
          <a class="btn btn-secondary" href="/profile.html">Profile</a>
          <button class="btn btn-ghost" id="logout-btn" type="button">Logout</button>
        </div>
      </section>
      <section class="glass panel wide">
        <h2>Leaves overview</h2>
        <p class="muted section-copy">Wardens and chiefs get full visibility while guards remain the approval gate.</p>
        <div id="leaves-list" class="card-list"></div>
      </section>
      <div id="message" class="message floating"></div>
    </main>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
