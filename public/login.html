<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | HostelFlow</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="shell auth-shell">
      <section class="glass auth-card">
        <p class="eyebrow">Welcome back</p>
        <h1>Login to your hostel workspace</h1>
        <form id="login-form" class="stack-form">
          <label>Email<input type="email" name="email" placeholder="you@example.com" required /></label>
          <label>Password<input type="password" name="password" placeholder="Password" required /></label>
          <button class="btn btn-primary" type="submit">Login</button>
        </form>
        <p class="muted">Student account only? <a href="/signup.html">Create one here</a>.</p>
        <div id="message" class="message"></div>
      </section>
    </main>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
