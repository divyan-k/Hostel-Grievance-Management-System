<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup | HostelFlow</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="shell auth-shell">
      <section class="glass auth-card">
        <p class="eyebrow">Student onboarding</p>
        <h1>Create your student account</h1>
        <form id="signup-form" class="stack-form">
          <label>Full name<input type="text" name="name" placeholder="Student name" required /></label>
          <label>Email<input type="email" name="email" placeholder="you@example.com" required /></label>
          <label>Room<input type="text" name="room" placeholder="A-204" /></label>
          <label>Password<input type="password" name="password" placeholder="Password" required /></label>
          <button class="btn btn-primary" type="submit">Create account</button>
        </form>
        <div id="message" class="message"></div>
      </section>
    </main>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
